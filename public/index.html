<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Pro</title>

<style>
body{margin:0;background:#0b0f19;color:#fff;font-family:sans-serif}
.container{display:flex;height:100vh}

/* SIDEBAR */
.sidebar{width:250px;background:#111;padding:10px}
.room{padding:10px;background:#222;margin:5px 0;border-radius:8px;cursor:pointer}

/* CHAT */
.chat{flex:1;display:flex;flex-direction:column}
.messages{flex:1;padding:10px;overflow:auto}
.msg{margin:5px;padding:10px;border-radius:10px}
.me{background:#22c55e;margin-left:auto}
.other{background:#333}

.inputBox{display:flex}
input{flex:1;padding:10px}
button{padding:10px}

/* VIDEO PLAYER */
#player{
  position:fixed;
  bottom:10px;
  right:10px;
  width:320px;
  background:#000;
  border-radius:10px;
  overflow:hidden;
}

#video{
  width:100%;
}

.controls{
  display:flex;
  align-items:center;
  gap:8px;
  padding:6px;
  background:#111;
}

.progress{
  flex:1;
  height:5px;
  background:#333;
  cursor:pointer;
  position:relative;
}

.progress div{
  height:100%;
  width:0%;
  background:#22c55e;
}

button.ctrl{
  background:none;
  border:none;
  color:#fff;
  font-size:16px;
  cursor:pointer;
}

/* MOBILE */
#topbar{display:none;background:#111;padding:10px;justify-content:space-between}
#mobileMenu{
  position:fixed;left:-100%;top:0;width:80%;height:100%;
  background:#111;transition:0.3s;z-index:999;
}
#mobileMenu.active{left:0}

#overlay{
  position:fixed;width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
}
#overlay.active{display:block}

@media(max-width:700px){
  .sidebar{display:none}
  #topbar{display:flex}
  .inputBox{position:fixed;bottom:0;width:100%}

  #player{
    width:100%;
    right:0;
    bottom:70px;
    border-radius:0;
  }
}
</style>
</head>

<body>

<div id="topbar">
  <button onclick="toggleMenu()">☰</button>
  <span>Chat</span>
  <button onclick="startScreen()">📺</button>
</div>

<div id="mobileMenu">
  <button onclick="createRoom()">+ Oda</button>
  <div id="roomsMobile"></div>
  <div id="usersMobile"></div>
</div>

<div id="overlay" onclick="closeMenu()"></div>

<div class="container">

<div class="sidebar">
  <button onclick="createRoom()">+ Oda</button>
  <button onclick="startScreen()">📺</button>
  <div id="rooms"></div>
  <div id="users"></div>
</div>

<div class="chat">
  <div class="messages" id="messages"></div>

  <div class="inputBox">
    <input id="msg">
    <button onclick="send()">Gönder</button>
  </div>
</div>

</div>

<!-- PLAYER -->
<div id="player" style="display:none;">
  <video id="video" autoplay playsinline></video>

  <div class="controls">
    <button class="ctrl" onclick="togglePlay()">▶</button>
    <button class="ctrl" onclick="toggleMute()">🔊</button>

    <div class="progress" onclick="seek(event)">
      <div id="progressBar"></div>
    </div>

    <button class="ctrl" onclick="fullScreen()">⛶</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
let username = prompt("İsmin");
socket.emit("setName", username);

let localStream;
let peerConnections={};
let video=document.getElementById("video");

/* MENU */
function toggleMenu(){
  mobileMenu.classList.toggle("active");
  overlay.classList.toggle("active");
}
function closeMenu(){
  mobileMenu.classList.remove("active");
  overlay.classList.remove("active");
}

/* ROOMS */
socket.emit("getRooms");

socket.on("rooms", list=>{
  rooms.innerHTML="";
  roomsMobile.innerHTML="";

  list.forEach(r=>{
    let el=document.createElement("div");
    el.className="room";
    el.innerText=r.name+" ("+r.count+")";
    el.onclick=()=>joinRoom(r.name);

    rooms.appendChild(el.cloneNode(true));
    roomsMobile.appendChild(el);
  });
});

/* USERS */
socket.on("users", list=>{
  users.innerText=list.join(", ");
  usersMobile.innerText=list.join(", ");
});

/* JOIN */
function joinRoom(name){
  const pass=prompt("Şifre");
  socket.emit("joinRoom",{room:name,username,pass});
  closeMenu();
}

/* CREATE */
function createRoom(){
  const name=prompt("Oda adı");
  const pass=prompt("Şifre");
  socket.emit("createRoom",{name,pass});
}

/* CHAT */
function send(){
  let m=msg.value;
  if(!m) return;
  socket.emit("chatMessage",m);
  msg.value="";
}

socket.on("message",m=>{
  let d=document.createElement("div");
  d.className="msg "+(m.user===username?"me":"other");
  d.innerText=m.user+": "+m.text;
  messages.appendChild(d);
});

msg.addEventListener("keypress",e=>{
  if(e.key==="Enter") send();
});

/* WEBRTC */
const config={iceServers:[{urls:"stun:stun.l.google.com:19302"}]};

async function startScreen(){
  localStream = await navigator.mediaDevices.getDisplayMedia({
    video:true,audio:true
  });

  socket.emit("startStream");
  showVideo(localStream,true);
}

socket.on("viewerJoined", async id=>{
  const pc=new RTCPeerConnection(config);
  peerConnections[id]=pc;

  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));

  pc.onicecandidate=e=>{
    if(e.candidate){
      socket.emit("candidate",{to:id,candidate:e.candidate});
    }
  };

  const offer=await pc.createOffer();
  await pc.setLocalDescription(offer);

  socket.emit("offer",{to:id,offer});
});

socket.on("watchStream", id=>{
  socket.emit("watchStream",id);
});

socket.on("newStreamer", id=>{
  socket.emit("watchStream",id);
});

socket.on("offer", async ({from,offer})=>{
  const pc=new RTCPeerConnection(config);
  peerConnections[from]=pc;

  pc.ontrack=e=>showVideo(e.streams[0]);

  pc.onicecandidate=e=>{
    if(e.candidate){
      socket.emit("candidate",{to:from,candidate:e.candidate});
    }
  };

  await pc.setRemoteDescription(offer);

  const answer=await pc.createAnswer();
  await pc.setLocalDescription(answer);

  socket.emit("answer",{to:from,answer});
});

socket.on("answer",({from,answer})=>{
  peerConnections[from].setRemoteDescription(answer);
});

socket.on("candidate",({from,candidate})=>{
  peerConnections[from].addIceCandidate(candidate);
});

socket.on("streamEnded",()=>{
  document.getElementById("player").style.display="none";
});

/* PLAYER */
function showVideo(stream, muted=false){
  video.srcObject=stream;
  video.muted=muted;
  document.getElementById("player").style.display="block";
}

/* PLAYER CONTROLS */
function togglePlay(){
  video.paused ? video.play() : video.pause();
}

function toggleMute(){
  video.muted=!video.muted;
}

function fullScreen(){
  video.requestFullscreen();
}

video.ontimeupdate=()=>{
  let p=(video.currentTime/video.duration)*100;
  document.getElementById("progressBar").style.width=p+"%";
};

function seek(e){
  let rect=e.target.getBoundingClientRect();
  let percent=(e.clientX-rect.left)/rect.width;
  video.currentTime=video.duration*percent;
}
</script>

</body>
</html>
