<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;display:flex;height:100vh;background:#0f172a;color:#fff;font-family:sans-serif}
#sidebar{width:230px;background:#020617;padding:10px}
#chat{flex:1;display:flex;flex-direction:column}
#messages{flex:1;overflow:auto;padding:10px}
#videos{display:flex;flex-wrap:wrap}

.msg{padding:8px;margin:5px;border-radius:8px;max-width:60%}
.me{background:#2563eb;margin-left:auto}
.other{background:#1e293b}

video{width:250px;margin:5px;border-radius:10px;background:black}

#input{display:flex}
#input input{flex:1;padding:10px}
button{padding:6px;margin:3px}

@media(max-width:768px){
 body{flex-direction:column}
 video{width:100%}
}
</style>
</head>

<body>

<div id="sidebar">
<button onclick="createRoom()">Oda Kur</button>
<div id="rooms"></div>

<h4>Aktif</h4>
<div id="users"></div>

<hr>
<button onclick="startScreen()">Ekran Paylaş</button>
</div>

<div id="chat">
<div id="messages"></div>
<div id="videos"></div>

<div id="input">
<input id="msg">
<button onclick="send()">Gönder</button>
</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let username = prompt("İsim:");
let currentRoom = "";
let peer;

/* ROOMS */
function createRoom(){
  const room=prompt("Oda adı:");
  const password=prompt("Şifre:");
  socket.emit("create-room",{room,password,username});
  currentRoom=room;
}

function joinRoom(r){
  const password=prompt("Şifre:");
  socket.emit("join-room",{room:r,password,username});
  currentRoom=r;
}

/* LİSTE */
socket.on("room-list",(rooms)=>{
  const div=document.getElementById("rooms");
  div.innerHTML="";
  rooms.forEach(r=>{
    div.innerHTML+=`<div onclick="joinRoom('${r}')">${r}</div>`;
  });
});

socket.on("user-list",(rooms)=>{
  const div=document.getElementById("users");
  div.innerHTML="";
  Object.keys(rooms).forEach(r=>{
    rooms[r].users.forEach(u=>{
      div.innerHTML+=u.username+"<br>";
    });
  });
});

/* CHAT */
function send(){
  const m=document.getElementById("msg");
  if(!m.value) return;
  socket.emit("message",m.value);
  m.value="";
}

socket.on("message",(d)=>{
  const div=document.getElementById("messages");
  div.innerHTML+=`
  <div class="msg ${d.username===username?"me":"other"}">
    ${d.username}: ${d.msg}
  </div>`;
});

/* PEER */
function createPeer(){
  return new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });
}

/* SCREEN SHARE */
async function startScreen(){

  document.getElementById("videos").innerHTML="";

  const stream = await navigator.mediaDevices.getDisplayMedia({
    video:true,
    audio:true
  });

  peer=createPeer();

  stream.getTracks().forEach(t=>peer.addTrack(t,stream));

  peer.onicecandidate=e=>{
    if(e.candidate) socket.emit("ice-candidate",e.candidate);
  };

  const offer=await peer.createOffer();
  await peer.setLocalDescription(offer);
  socket.emit("offer",offer);

  stream.getVideoTracks()[0].onended=()=>{
    document.getElementById("videos").innerHTML="";
    if(peer) peer.close();
  };
}

/* RECEIVE */
socket.on("offer",async offer=>{
  document.getElementById("videos").innerHTML="";

  peer=createPeer();

  peer.ontrack=e=>{
    document.getElementById("videos").innerHTML="";

    const v=document.createElement("video");
    v.srcObject=e.streams[0];
    v.autoplay=true;
    v.controls=true;
    v.playsInline=true;

    document.getElementById("videos").appendChild(v);
  };

  peer.onicecandidate=e=>{
    if(e.candidate) socket.emit("ice-candidate",e.candidate);
  };

  await peer.setRemoteDescription(offer);
  const answer=await peer.createAnswer();
  await peer.setLocalDescription(answer);
  socket.emit("answer",answer);
});

socket.on("answer",a=>peer.setRemoteDescription(a));
socket.on("ice-candidate",c=>peer.addIceCandidate(c));
</script>

</body>
</html>
