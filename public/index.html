<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat</title>

<style>
body{margin:0;display:flex;height:100vh;font-family:sans-serif;background:#0f172a;color:#fff}

#sidebar{width:250px;background:#020617;padding:15px}
#chat{flex:1;display:flex;flex-direction:column}

#messages{flex:1;overflow:auto;padding:10px;display:flex;flex-direction:column}

.msg{max-width:60%;padding:10px;margin:5px;border-radius:10px}
.me{background:#2563eb;align-self:flex-end}
.other{background:#1e293b}

.time{font-size:11px;color:#94a3b8;margin-top:5px;text-align:right}

#input{display:flex;padding:10px;background:#020617}
#msg{flex:1;padding:10px;background:#0f172a;color:#fff;border:none;border-radius:8px}

#sendBtn{padding:8px 15px;margin-left:10px;background:#2563eb;border:none;border-radius:8px;color:#fff}

.room{padding:6px;margin:5px 0;background:#0f172a;cursor:pointer;border-radius:6px}

.online{width:8px;height:8px;background:lime;border-radius:50%;display:inline-block;margin-left:5px}
</style>
</head>

<body>

<div id="sidebar">
<h3>Odalar</h3>
<button onclick="createRoom()">+ Oda Kur</button>
<div id="rooms"></div>

<h4>Aktif</h4>
<div id="users"></div>
</div>

<div id="chat">
<div id="messages"></div>
<div id="typing"></div>

<div id="input">
<input id="msg" placeholder="Mesaj yaz...">
<button id="sendBtn" onclick="send()">Gönder</button>
</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let username = prompt("İsim:");
let currentRoom = "";

const msgInput = document.getElementById("msg");
const messages = document.getElementById("messages");
const roomsDiv = document.getElementById("rooms");
const usersDiv = document.getElementById("users");

/* ENTER */
msgInput.addEventListener("keypress", e=>{
  if(e.key==="Enter"){
    e.preventDefault();
    send();
  }
});

/* ODA KUR */
function createRoom(){
  const room = prompt("Oda adı:");
  const password = prompt("Şifre:");
  if(!room || !password) return;

  socket.emit("create-room",{room,password,username});
  currentRoom = room;
  messages.innerHTML="";
}

/* GİR */
function joinRoom(room){
  const password = prompt("Şifre:");
  socket.emit("join-room",{room,password,username});
  currentRoom = room;
  messages.innerHTML="";
}

/* ODA LİSTESİ */
socket.on("room-list",(rooms)=>{
  roomsDiv.innerHTML="";

  if(rooms.length===0){
    roomsDiv.innerHTML="Oda yok, ilk sen kur";
    return;
  }

  rooms.forEach(r=>{
    roomsDiv.innerHTML += `<div class="room" onclick="joinRoom('${r}')">${r}</div>`;
  });
});

/* USERS */
socket.on("user-list",(rooms)=>{
  usersDiv.innerHTML="";
  Object.keys(rooms).forEach(r=>{
    usersDiv.innerHTML += `<b>${r}</b><br>`;
    rooms[r].users.forEach(u=>{
      usersDiv.innerHTML += `${u.username} <span class="online"></span><br>`;
    });
  });
});

/* MESAJ */
function send(){
  const msg = msgInput.value;
  if(!msg) return;

  socket.emit("message",msg);
  msgInput.value="";
}

socket.on("message",(d)=>{
  const isMe = d.username === username;

  messages.innerHTML += `
    <div class="msg ${isMe ? "me" : "other"}">
      ${!isMe ? "<b>"+d.username+"</b><br>" : ""}
      ${d.msg}
      <div class="time">${d.time}</div>
    </div>
  `;

  messages.scrollTop = messages.scrollHeight;
});
</script>

</body>
</html>
