<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Pro</title>

<style>
body{margin:0;font-family:sans-serif;background:#0b0f19;color:#fff}
.container{display:flex;height:100vh}

/* SIDEBAR */
.sidebar{width:250px;background:#111;padding:10px;overflow:auto}
.room{padding:10px;background:#222;margin:5px 0;border-radius:8px;cursor:pointer}

/* CHAT */
.chat{flex:1;display:flex;flex-direction:column}
.messages{flex:1;padding:10px;overflow:auto}
.msg{margin:5px;padding:10px;border-radius:10px;max-width:70%}
.me{background:#22c55e;margin-left:auto}
.other{background:#333}

.inputBox{display:flex}
input{flex:1;padding:10px}
button{padding:10px}

/* VIDEO */
video{
  position:fixed;
  right:10px;
  top:10px;
  width:250px;
  border-radius:10px;
  background:#000;
}

/* MOBİL */
#topbar{display:none;background:#111;padding:10px}
#mobileMenu{
  position:fixed;
  left:-100%;
  top:0;
  width:80%;
  height:100%;
  background:#111;
  transition:0.3s;
  z-index:999;
  padding:10px;
}
#mobileMenu.active{left:0}

@media(max-width:700px){
  .sidebar{display:none}
  #topbar{display:flex}
  .inputBox{position:fixed;bottom:0;width:100%}
}
</style>
</head>

<body>

<div id="topbar">
  <button onclick="toggleMenu()">☰</button>
  <span>Chat Pro</span>
  <button onclick="startScreen()">📺</button>
</div>

<div id="mobileMenu">
  <button onclick="createRoom()">+ Oda</button>
  <div id="roomsMobile"></div>
</div>

<div class="container">

<div class="sidebar">
  <button onclick="createRoom()">+ Oda</button>
  <button onclick="startScreen()">📺</button>
  <div id="rooms"></div>
</div>

<div class="chat">
  <div class="messages" id="messages"></div>

  <div class="inputBox">
    <input id="msg" placeholder="Mesaj yaz">
    <button onclick="send()">Gönder</button>
  </div>
</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

let username = prompt("İsmin");
socket.emit("setName", username);

let currentRoom="";
let localStream;
let peerConnections = {};
let isStreamer = false;

/* MENU */
function toggleMenu(){
  document.getElementById("mobileMenu").classList.toggle("active");
}

/* ROOMS */
socket.emit("getRooms");

socket.on("rooms", list=>{
  const desk=document.getElementById("rooms");
  const mob=document.getElementById("roomsMobile");

  desk.innerHTML="";
  mob.innerHTML="";

  list.forEach(r=>{
    const el=document.createElement("div");
    el.className="room";
    el.innerText=r.name+" ("+r.count+")";
    el.onclick=()=>joinRoom(r.name);

    desk.appendChild(el.cloneNode(true));
    mob.appendChild(el);
  });
});

/* JOIN */
function joinRoom(name){
  const pass=prompt("Şifre");
  socket.emit("joinRoom",{room:name,username,pass});
  currentRoom=name;
}

/* CREATE */
function createRoom(){
  const name=prompt("Oda adı");
  const pass=prompt("Şifre");
  if(!name) return;
  socket.emit("createRoom",{name,pass});
}

/* CHAT */
function send(){
  const m=document.getElementById("msg").value;
  if(!m) return;

  socket.emit("chatMessage",m);
  document.getElementById("msg").value="";
}

socket.on("message",m=>{
  const d=document.createElement("div");
  d.className="msg "+(m.user===username?"me":"other");
  d.innerText=m.user+": "+m.text;
  document.getElementById("messages").appendChild(d);
});

document.getElementById("msg").addEventListener("keypress",e=>{
  if(e.key==="Enter") send();
});

/* WEBRTC */
const config = {
  iceServers:[{urls:"stun:stun.l.google.com:19302"}]
};

/* START STREAM */
async function startScreen(){
  localStream = await navigator.mediaDevices.getDisplayMedia({
    video:true,
    audio:true
  });

  isStreamer=true;
  socket.emit("startStream");

  showVideo(localStream,true);
}

/* VIEWER JOIN */
socket.on("viewerJoined", async (viewerId)=>{
  const pc=new RTCPeerConnection(config);
  peerConnections[viewerId]=pc;

  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));

  pc.onicecandidate=e=>{
    if(e.candidate){
      socket.emit("candidate",{to:viewerId,candidate:e.candidate});
    }
  };

  const offer=await pc.createOffer();
  await pc.setLocalDescription(offer);

  socket.emit("offer",{to:viewerId,offer});
});

/* WATCH */
socket.on("watchStream",(id)=>{
  socket.emit("watchStream",id);
});

socket.on("newStreamer",(id)=>{
  socket.emit("watchStream",id);
});

/* OFFER */
socket.on("offer", async ({from,offer})=>{
  const pc=new RTCPeerConnection(config);
  peerConnections[from]=pc;

  pc.ontrack=e=>{
    showVideo(e.streams[0]);
  };

  pc.onicecandidate=e=>{
    if(e.candidate){
      socket.emit("candidate",{to:from,candidate:e.candidate});
    }
  };

  await pc.setRemoteDescription(offer);

  const answer=await pc.createAnswer();
  await pc.setLocalDescription(answer);

  socket.emit("answer",{to:from,answer});
});

/* ANSWER */
socket.on("answer",({from,answer})=>{
  peerConnections[from].setRemoteDescription(answer);
});

/* ICE */
socket.on("candidate",({from,candidate})=>{
  peerConnections[from].addIceCandidate(candidate);
});

/* END */
socket.on("streamEnded",()=>{
  const v=document.getElementById("video");
  if(v){
    v.srcObject=null;
    v.remove();
  }
});

/* VIDEO */
function showVideo(stream,muted=false){
  let v=document.getElementById("video");

  if(!v){
    v=document.createElement("video");
    v.id="video";
    v.autoplay=true;
    document.body.appendChild(v);
  }

  v.muted=muted;
  v.srcObject=stream;
}
</script>

</body>
</html>
