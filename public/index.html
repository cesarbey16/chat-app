<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Pro Premium</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI;}

body{
  display:flex;
  height:100vh;
  background:#0b0f19;
  color:#fff;
}

/* SOL PANEL */
.sidebar{
  width:280px;
  background:#0f172a;
  padding:15px;
  border-right:1px solid #1e293b;
  display:flex;
  flex-direction:column;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.addBtn{
  background:#22c55e;
  border:none;
  padding:5px 10px;
  border-radius:6px;
  cursor:pointer;
}

.room{
  background:#1e293b;
  padding:10px;
  border-radius:8px;
  margin-bottom:5px;
  cursor:pointer;
}

.room:hover{
  background:#334155;
}

.users{
  margin-top:auto;
  font-size:12px;
  opacity:.8;
}

/* CHAT */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

.header{
  padding:10px;
  border-bottom:1px solid #1e293b;
  display:flex;
  justify-content:space-between;
}

.messages{
  flex:1;
  overflow:auto;
  padding:15px;
}

.msg{
  max-width:65%;
  padding:10px;
  margin:6px 0;
  border-radius:12px;
  position:relative;
}

.me{
  background:#22c55e;
  margin-left:auto;
}

.other{
  background:#1e293b;
}

.time{
  font-size:10px;
  opacity:.7;
  position:absolute;
  bottom:2px;
  right:6px;
}

/* INPUT */
.inputBox{
  display:flex;
  padding:10px;
  background:#020617;
}

input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
}

button{
  margin-left:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#000000aa;
  display:none;
  justify-content:center;
  align-items:center;
}

.modalBox{
  background:#0f172a;
  padding:20px;
  border-radius:10px;
}

.modal input{
  margin:5px 0;
  width:100%;
}

/* MOBİL */
@media(max-width:700px){
  .sidebar{display:none;}
}
</style>
</head>

<body>

<div class="sidebar">

<div class="top">
  <h3>Odalar</h3>
  <button class="addBtn" onclick="openModal()">+</button>
</div>

<div id="rooms"></div>

<div class="users" id="users"></div>

</div>

<div class="chat">

<div class="header">
  <span id="roomName">Genel</span>
  <button onclick="startScreen()">📺</button>
</div>

<div class="messages" id="messages"></div>

<div class="inputBox">
  <input id="msg" placeholder="Mesaj yaz..." />
  <button onclick="send()">➤</button>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modalBox">
    <h3>Oda Kur</h3>
    <input id="roomInput" placeholder="Oda adı">
    <input id="passInput" placeholder="Şifre">
    <button onclick="createRoom()">Oluştur</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

let username = prompt("İsmin?");
let room = "";

socket.emit("getRooms");

/* ODA LİSTESİ */
socket.on("rooms", (list)=>{
  const div = document.getElementById("rooms");
  div.innerHTML="";

  list.forEach(r=>{
    const el=document.createElement("div");
    el.className="room";
    el.innerText=r.name;
    el.onclick=()=>joinRoom(r.name);
    div.appendChild(el);
  });
});

/* ODAYA GİR */
function joinRoom(name){
  const pass = prompt("Şifre gir");
  socket.emit("joinRoom",{room:name, username, pass});
  room=name;
  document.getElementById("roomName").innerText=name;
}

/* MESAJ */
function send(){
  const msg=document.getElementById("msg").value;
  if(!msg) return;

  socket.emit("chatMessage", msg);
  addMsg(msg,true);

  document.getElementById("msg").value="";
}

/* MESAJ GÖSTER */
function addMsg(text, me){
  const div=document.createElement("div");
  div.className="msg "+(me?"me":"other");

  const time=new Date().toLocaleTimeString().slice(0,5);

  div.innerHTML=`${text}<div class="time">${time} ✔✔</div>`;

  document.getElementById("messages").appendChild(div);
}

/* MESAJ AL */
socket.on("message",(msg)=>{
  addMsg(msg.text,false);
});

/* ENTER */
document.getElementById("msg").addEventListener("keypress",e=>{
  if(e.key==="Enter") send();
});

/* ODA KUR */
function openModal(){
  document.getElementById("modal").style.display="flex";
}

function createRoom(){
  const name=document.getElementById("roomInput").value;
  const pass=document.getElementById("passInput").value;

  socket.emit("createRoom",{name,pass});
  document.getElementById("modal").style.display="none";
}

/* KULLANICILAR */
socket.on("users",(list)=>{
  document.getElementById("users").innerHTML=
    "Aktif: "+list.join(", ");
});

/* EKRAN PAYLAŞ */
async function startScreen(){
  try{
    const stream=await navigator.mediaDevices.getDisplayMedia({
      video:true,
      audio:true
    });

    const video=document.createElement("video");
    video.srcObject=stream;
    video.autoplay=true;
    video.style.width="200px";

    document.body.appendChild(video);

  }catch(e){
    alert("Ekran paylaşım hatası");
  }
}
</script>

</body>
</html>
