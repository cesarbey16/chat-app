<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Pro</title>

<style>
body{margin:0;font-family:sans-serif;background:#0b0f19;color:white}

/* TOP BAR */
#topbar{
  display:none;
  background:#111;
  padding:10px;
  align-items:center;
  justify-content:space-between;
}

#menuBtn{
  font-size:20px;
}

/* MENU */
#mobileMenu{
  position:fixed;
  top:0;
  left:-100%;
  width:80%;
  height:100%;
  background:#111;
  transition:0.3s;
  z-index:999;
  padding:10px;
  overflow:auto;
}

#mobileMenu.active{
  left:0;
}

/* CHAT */
.messages{
  height:calc(100vh - 70px);
  overflow:auto;
  padding:10px;
}

.msg{
  margin:5px;
  padding:10px;
  border-radius:10px;
  max-width:80%;
}

.me{background:#22c55e;margin-left:auto}
.other{background:#333}

/* INPUT */
.inputBox{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}

input{
  flex:1;
  padding:15px;
  font-size:16px;
}

button{
  padding:15px;
  font-size:16px;
}

/* VIDEO */
video{
  position:fixed;
  top:10px;
  right:10px;
  width:200px;
  border-radius:10px;
}

/* MOBİL */
@media(max-width:700px){
  #topbar{display:flex}
}

/* SWIPE AREA */
#swipeZone{
  position:fixed;
  left:0;
  top:0;
  width:20px;
  height:100%;
  z-index:998;
}
</style>
</head>

<body>

<div id="swipeZone"></div>

<div id="topbar">
  <button id="menuBtn" onclick="toggleMenu()">☰</button>
  <span>Chat Pro</span>
</div>

<div id="mobileMenu">
  <button onclick="createRoom()">+ Oda</button>
  <button onclick="startScreen()">📺 Yayın</button>

  <select id="quality">
    <option value="low">Düşük</option>
    <option value="medium" selected>Orta</option>
    <option value="high">Yüksek</option>
  </select>

  <div id="rooms"></div>
  <div id="users"></div>
</div>

<div class="messages" id="messages"></div>

<div class="inputBox">
  <input id="msg" placeholder="Mesaj yaz">
  <button onclick="send()">Gönder</button>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

let username = prompt("İsmin");
socket.emit("setName", username);

let currentRoom="";
let localStream;

/* MENU */
function toggleMenu(){
  document.getElementById("mobileMenu").classList.toggle("active");
}

/* SWIPE */
let startX=0;

document.getElementById("swipeZone").addEventListener("touchstart",e=>{
  startX = e.touches[0].clientX;
});

document.addEventListener("touchmove",e=>{
  let moveX = e.touches[0].clientX;

  if(moveX - startX > 50){
    document.getElementById("mobileMenu").classList.add("active");
  }
});

/* ROOMS */
socket.emit("getRooms");

socket.on("rooms", list=>{
  const div=document.getElementById("rooms");
  div.innerHTML="";
  list.forEach(r=>{
    const el=document.createElement("div");
    el.className="room";
    el.innerText=`${r.locked?"🔒":"🟢"} ${r.name} (${r.count})`;
    el.onclick=()=>{
      joinRoom(r.name);
      toggleMenu();
    };
    div.appendChild(el);
  });
});

/* USERS */
socket.on("users", list=>{
  document.getElementById("users").innerText="👥 "+list.join(", ");
});

/* JOIN */
function joinRoom(name){
  const pass=prompt("Şifre");
  socket.emit("joinRoom",{room:name,username,pass});
  currentRoom=name;
}

/* CREATE */
function createRoom(){
  const name=prompt("Oda adı");
  const pass=prompt("Şifre");
  if(!name) return;
  socket.emit("createRoom",{name,pass});
}

/* CHAT */
function send(){
  const m=document.getElementById("msg").value;
  if(!m) return;
  socket.emit("chatMessage",m);
  document.getElementById("msg").value="";
}

socket.on("message",m=>{
  const d=document.createElement("div");
  d.className="msg "+(m.user===username?"me":"other");
  d.innerText=m.user+": "+m.text;
  document.getElementById("messages").appendChild(d);
});

/* ENTER */
document.getElementById("msg").addEventListener("keypress",e=>{
  if(e.key==="Enter") send();
});

/* KALİTE */
function getQuality(){
  if(/Android|iPhone/i.test(navigator.userAgent)){
    return {width:640,height:360,frameRate:15};
  }

  const q=document.getElementById("quality").value;

  if(q==="low") return {width:640,height:360,frameRate:15};
  if(q==="medium") return {width:1280,height:720,frameRate:25};
  return {width:1920,height:1080,frameRate:30};
}

/* SCREEN */
async function startScreen(){
  try{
    localStream = await navigator.mediaDevices.getDisplayMedia({
      video:getQuality(),
      audio:true
    });

    socket.emit("startScreen");

    showVideo(localStream,true);

    localStream.getVideoTracks()[0].onended = stopScreen;

  }catch{
    alert("Desteklenmiyor");
  }
}

function stopScreen(){
  if(localStream){
    localStream.getTracks().forEach(t=>t.stop());
  }

  socket.emit("stopScreen");

  const v=document.getElementById("video");
  if(v){
    v.srcObject=null;
    v.remove();
  }
}

socket.on("screenStopped", ()=>{
  const v=document.getElementById("video");
  if(v){
    v.srcObject=null;
    v.remove();
  }
});

function showVideo(stream,muted=false){
  let v=document.getElementById("video");
  if(!v){
    v=document.createElement("video");
    v.id="video";
    v.autoplay=true;
    document.body.appendChild(v);
  }
  v.muted=muted;
  v.srcObject=stream;
}
</script>

</body>
</html>
