<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Pro</title>

<style>
body{margin:0;font-family:sans-serif;background:#0b0f19;color:white}
.container{display:flex;height:100vh}

.sidebar{
  width:250px;
  background:#111;
  padding:10px;
  overflow:auto;
}

.room{
  padding:10px;
  background:#222;
  margin:5px 0;
  border-radius:8px;
  cursor:pointer;
}

.room:hover{background:#333}

.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

.messages{
  flex:1;
  padding:10px;
  overflow:auto;
}

.msg{
  margin:5px;
  padding:10px;
  border-radius:10px;
  max-width:70%;
}

.me{background:#22c55e;margin-left:auto}
.other{background:#333}

.inputBox{
  display:flex;
}

input{
  flex:1;
  padding:10px;
}

button{
  padding:10px;
}

@media(max-width:700px){
  .sidebar{display:none}
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
  <button onclick="createRoom()">+ Oda</button>
  <button onclick="startScreen()">📺</button>
  <div id="rooms"></div>
  <div id="users"></div>
</div>

<div class="chat">
  <div class="messages" id="messages"></div>

  <div class="inputBox">
    <input id="msg" placeholder="Mesaj yaz">
    <button onclick="send()">Gönder</button>
  </div>
</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

let username = prompt("İsmin");
let currentRoom="";
let localStream;

/* ROOMS */
socket.emit("getRooms");

socket.on("rooms", list=>{
  const div=document.getElementById("rooms");
  div.innerHTML="";

  list.forEach(r=>{
    const el=document.createElement("div");
    el.className="room";
    el.innerText=`${r.locked?"🔒":"🟢"} ${r.name} (${r.count})`;
    el.onclick=()=>joinRoom(r.name);
    div.appendChild(el);
  });
});

/* USERS */
socket.on("users", list=>{
  document.getElementById("users").innerText =
    "👥 " + list.join(", ");
});

/* ERROR */
socket.on("errorMsg", msg=>{
  alert(msg);
});

/* JOIN */
function joinRoom(name){
  const pass = prompt("Şifre");
  socket.emit("joinRoom",{room:name,username,pass});
  currentRoom=name;
}

/* CREATE ROOM */
function createRoom(){
  const name = prompt("Oda adı");
  const pass = prompt("Şifre (boş olabilir)");

  if(!name) return;

  socket.emit("createRoom",{name,pass});
}

/* CHAT */
function send(){
  const m=document.getElementById("msg").value;
  if(!m) return;

  socket.emit("chatMessage",m);
  addMsg(m,true);

  document.getElementById("msg").value="";
}

function addMsg(text,me){
  const d=document.createElement("div");
  d.className="msg "+(me?"me":"other");
  d.innerText=text;
  document.getElementById("messages").appendChild(d);
}

socket.on("message",m=>{
  addMsg(m.text,false);
});

/* ENTER */
document.getElementById("msg").addEventListener("keypress",e=>{
  if(e.key==="Enter") send();
});

/* SCREEN (BASİT) */
async function startScreen(){
  try{
    localStream = await navigator.mediaDevices.getDisplayMedia({
      video:true,
      audio:true
    });

    socket.emit("startScreen");

    let v=document.createElement("video");
    v.srcObject=localStream;
    v.autoplay=true;
    v.style.width="200px";
    document.body.appendChild(v);

  }catch(e){
    alert("Ekran paylaşımı desteklenmiyor");
  }
}
</script>

</body>
</html>
