<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  display:flex;
  height:100vh;
  font-family:sans-serif;
  background:#0f172a;
  color:#fff;
}

/* SIDEBAR */
#sidebar{
  width:260px;
  background:#020617;
  padding:15px;
  border-right:1px solid #1e293b;
}

h3,h4{
  margin:10px 0;
  color:#38bdf8;
}

button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:#fff;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:#1d4ed8;
}

/* ROOMS */
.room{
  padding:8px;
  margin:5px 0;
  background:#0f172a;
  border-radius:6px;
  cursor:pointer;
}

.room:hover{
  background:#1e293b;
}

/* CHAT */
#chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

#messages{
  flex:1;
  overflow:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
}

/* MESSAGE */
.msg{
  max-width:60%;
  padding:10px;
  margin:5px 0;
  border-radius:12px;
  animation:fade 0.2s ease;
}

.me{
  background:#2563eb;
  align-self:flex-end;
}

.other{
  background:#1e293b;
}

/* INPUT */
#input{
  display:flex;
  padding:10px;
  background:#020617;
  border-top:1px solid #1e293b;
}

#msg{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  outline:none;
  background:#0f172a;
  color:#fff;
}

/* USERS */
.user{
  font-size:14px;
}

.online{
  width:8px;
  height:8px;
  background:lime;
  border-radius:50%;
  display:inline-block;
  margin-left:5px;
}

/* VIDEO */
video{
  width:220px;
  margin:5px;
  border-radius:10px;
  border:2px solid #1e293b;
}

/* typing */
#typing{
  padding-left:10px;
  font-size:13px;
  color:#94a3b8;
}

/* anim */
@keyframes fade{
  from{opacity:0;transform:translateY(5px)}
  to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<div id="sidebar">
<h3>💬 Odalar</h3>

<button onclick="createRoom()">+ Oda Kur</button>

<div id="rooms"></div>

<h4>👥 Aktif</h4>
<div id="users"></div>

<button onclick="startScreen()">📺 Ekran Paylaş</button>
</div>

<div id="chat">
<div id="messages"></div>
<div id="typing"></div>
<div id="videos"></div>

<div id="input">
<input id="msg" placeholder="Mesaj yaz...">
<button onclick="send()">Gönder</button>
</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

const msgInput = document.getElementById("msg");
const messages = document.getElementById("messages");
const usersDiv = document.getElementById("users");
const roomsDiv = document.getElementById("rooms");
const typingDiv = document.getElementById("typing");
const videos = document.getElementById("videos");

let username = prompt("İsim:");
let currentRoom = "";

/* ENTER İLE GÖNDER */
msgInput.addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    e.preventDefault();
    send();
  }
});

/* ODA KUR */
function createRoom(){
  const room = prompt("Oda adı:");
  const password = prompt("Şifre:");
  if(!room || !password) return;

  socket.emit("create-room",{room,password,username});
  currentRoom = room;
  messages.innerHTML = "";
}

/* ODAYA GİR */
function joinRoom(room){
  const password = prompt("Şifre:");
  socket.emit("join-room",{room,password,username});
  currentRoom = room;
  messages.innerHTML = "";
}

/* ODA LİSTESİ */
socket.on("room-list",(rooms)=>{
  roomsDiv.innerHTML="";

  if(rooms.length === 0){
    roomsDiv.innerHTML = "<p>🚀 Henüz oda yok<br>İlk odayı sen kur</p>";
    return;
  }

  rooms.forEach(r=>{
    roomsDiv.innerHTML += `<div class="room" onclick="joinRoom('${r}')">${r}</div>`;
  });
});

/* KULLANICILAR */
socket.on("user-list",(rooms)=>{
  usersDiv.innerHTML="";
  Object.keys(rooms).forEach(r=>{
    usersDiv.innerHTML += `<b>${r}</b><br>`;
    rooms[r].users.forEach(u=>{
      usersDiv.innerHTML += `<div class="user">${u.username} <span class="online"></span></div>`;
    });
  });
});

/* MESAJ */
function send(){
  const msg = msgInput.value;
  if(!msg) return;

  socket.emit("message",msg);
  msgInput.value="";
}

socket.on("message",(d)=>{
  const isMe = d.username === username;

  messages.innerHTML += `
    <div class="msg ${isMe ? "me" : "other"}">
      ${!isMe ? "<b>"+d.username+"</b><br>" : ""}
      ${d.msg}
    </div>
  `;

  messages.scrollTop = messages.scrollHeight;
});

/* TYPING */
let t;
msgInput.oninput=()=>{
  socket.emit("typing");
  clearTimeout(t);
  t=setTimeout(()=>socket.emit("stop-typing"),1000);
};

socket.on("typing",u=>typingDiv.innerText=u+" yazıyor...");
socket.on("stop-typing",()=>typingDiv.innerText="");

/* SCREEN SHARE (AYNI) */
let peer,localStream,localVideo;

async function startScreen(){
  localStream = await navigator.mediaDevices.getDisplayMedia({video:true});

  localVideo=document.createElement("video");
  localVideo.srcObject=localStream;
  localVideo.autoplay=true;
  localVideo.muted=true;
  localVideo.controls=true;
  localVideo.onclick=()=>localVideo.requestFullscreen();

  videos.appendChild(localVideo);

  peer=new RTCPeerConnection();

  localStream.getTracks().forEach(t=>peer.addTrack(t,localStream));

  peer.onicecandidate=e=>{
    if(e.candidate) socket.emit("ice-candidate",e.candidate);
  };

  const offer=await peer.createOffer();
  await peer.setLocalDescription(offer);
  socket.emit("offer",offer);
}

socket.on("offer",async offer=>{
  peer=new RTCPeerConnection();

  peer.ontrack=e=>{
    const v=document.createElement("video");
    v.srcObject=e.streams[0];
    v.autoplay=true;
    v.controls=true;
    v.onclick=()=>v.requestFullscreen();
    videos.appendChild(v);
  };

  peer.onicecandidate=e=>{
    if(e.candidate) socket.emit("ice-candidate",e.candidate);
  };

  await peer.setRemoteDescription(offer);
  const answer=await peer.createAnswer();
  await peer.setLocalDescription(answer);
  socket.emit("answer",answer);
});

socket.on("answer",a=>peer.setRemoteDescription(a));
socket.on("ice-candidate",c=>peer.addIceCandidate(c));
</script>

</body>
</html>
