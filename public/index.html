<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat Pro</title>

<style>
body{margin:0;display:flex;height:100vh;background:#0f172a;color:#fff;font-family:sans-serif}

/* BUTON STYLE */
button{
  background:linear-gradient(45deg,#2563eb,#06b6d4);
  border:none;
  color:#fff;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}
button:hover{transform:scale(1.05)}

#menuBtn{display:none;position:absolute;top:10px;left:10px;z-index:999}

/* SIDEBAR */
#sidebar{width:240px;background:#020617;padding:15px}

/* CHAT */
#chat{flex:1;display:flex;flex-direction:column}
#messages{flex:1;overflow:auto;padding:10px;display:flex;flex-direction:column}

.msg{max-width:60%;padding:10px;margin:5px;border-radius:10px}
.me{background:#2563eb;align-self:flex-end}
.other{background:#1e293b}

.time{font-size:11px;color:#94a3b8;text-align:right}

#input{display:flex;padding:10px;background:#020617}
#msg{flex:1;padding:10px;border:none;border-radius:8px;background:#0f172a;color:#fff}
#sendBtn{margin-left:10px}

.room{padding:6px;margin:5px 0;background:#0f172a;border-radius:6px;cursor:pointer}
.online{width:8px;height:8px;background:lime;border-radius:50%;display:inline-block}

video{width:220px;margin:5px;border-radius:10px;background:black}

/* MOBİL */
@media(max-width:768px){
  body{flex-direction:column}
  #menuBtn{display:block}
  #sidebar{position:absolute;left:-100%;top:0;height:100%;transition:0.3s}
  #sidebar.active{left:0}
  video{width:100%}
}
</style>
</head>

<body>

<button id="menuBtn">☰</button>

<div id="sidebar">
<h3>Odalar</h3>
<button onclick="createRoom()">+ Oda</button>
<div id="rooms"></div>

<h4>Aktif</h4>
<div id="users"></div>

<hr>

<button onclick="startScreen()">📺 Paylaş</button>
<button onclick="toggleMic()">🎤 Mic Aç/Kapa</button>

</div>

<div id="chat">
<div id="messages"></div>
<div id="videos"></div>

<div id="input">
<input id="msg" placeholder="Mesaj yaz...">
<button onclick="send()">Gönder</button>
</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let username = prompt("İsim:");
let currentRoom = "";
let micEnabled = true;

const msgInput = document.getElementById("msg");
const messages = document.getElementById("messages");
const roomsDiv = document.getElementById("rooms");
const usersDiv = document.getElementById("users");
const videos = document.getElementById("videos");

/* MENU */
document.getElementById("menuBtn").onclick=()=>{
  sidebar.classList.toggle("active");
};

/* ENTER */
msgInput.addEventListener("keypress",e=>{
  if(e.key==="Enter") send();
});

/* ODA */
function createRoom(){
  const room=prompt("Oda adı:");
  const password=prompt("Şifre:");
  socket.emit("create-room",{room,password,username});
  currentRoom=room;
  messages.innerHTML="";
}

function joinRoom(room){
  const password=prompt("Şifre:");
  socket.emit("join-room",{room,password,username});
  currentRoom=room;
  messages.innerHTML="";
}

/* ROOMS */
socket.on("room-list",(rooms)=>{
  roomsDiv.innerHTML="";
  rooms.forEach(r=>{
    roomsDiv.innerHTML+=`<div class="room" onclick="joinRoom('${r}')">${r}</div>`;
  });
});

/* USERS */
socket.on("user-list",(rooms)=>{
  usersDiv.innerHTML="";
  Object.keys(rooms).forEach(r=>{
    rooms[r].users.forEach(u=>{
      usersDiv.innerHTML+=`${u.username} <span class="online"></span><br>`;
    });
  });
});

/* MESAJ */
function send(){
  const msg=msgInput.value;
  if(!msg)return;
  socket.emit("message",msg);
  msgInput.value="";
}

socket.on("message",(d)=>{
  messages.innerHTML+=`
  <div class="msg ${d.username===username?"me":"other"}">
    ${d.username!==username?"<b>"+d.username+"</b><br>":""}
    ${d.msg}
    <div class="time">${d.time}</div>
  </div>`;
});

/* MIC CONTROL */
function toggleMic(){
  if(!stream) return;
  stream.getAudioTracks().forEach(track=>{
    track.enabled = !track.enabled;
    micEnabled = track.enabled;
  });
}

/* WEBRTC */
let peer,stream;

function createPeer(){
  return new RTCPeerConnection({
    iceServers:[
      {urls:"stun:stun.l.google.com:19302"},
      {
        urls:"turn:openrelay.metered.ca:80",
        username:"openrelayproject",
        credential:"openrelayproject"
      }
    ]
  });
}

/* SCREEN SHARE (GELİŞMİŞ) */
async function startScreen(){

  let screen = await navigator.mediaDevices.getDisplayMedia({video:true});
  let mic = await navigator.mediaDevices.getUserMedia({audio:true});

  stream = new MediaStream([
    ...screen.getVideoTracks(),
    ...mic.getAudioTracks()
  ]);

  videos.innerHTML="";

  const video=document.createElement("video");
  video.srcObject=stream;
  video.autoplay=true;
  video.muted=true;
  video.onclick=()=>video.requestFullscreen();
  videos.appendChild(video);

  peer=createPeer();

  stream.getTracks().forEach(t=>peer.addTrack(t,stream));

  peer.onicecandidate=e=>{
    if(e.candidate) socket.emit("ice-candidate",e.candidate);
  };

  peer.onconnectionstatechange=()=>{
    if(peer.connectionState==="disconnected"){
      console.log("yeniden bağlanıyor...");
    }
  };

  const offer=await peer.createOffer({offerToReceiveAudio:true,offerToReceiveVideo:true});
  await peer.setLocalDescription(offer);
  socket.emit("offer",offer);

  screen.getVideoTracks()[0].onended=()=>{
    videos.innerHTML="";
    if(peer) peer.close();
  };
}

/* RECEIVE */
socket.on("offer",async offer=>{
  peer=createPeer();

  peer.ontrack=e=>{
    const v=document.createElement("video");
    v.srcObject=e.streams[0];
    v.autoplay=true;
    v.controls=true;
    videos.appendChild(v);
  };

  peer.onicecandidate=e=>{
    if(e.candidate) socket.emit("ice-candidate",e.candidate);
  };

  await peer.setRemoteDescription(offer);
  const answer=await peer.createAnswer();
  await peer.setLocalDescription(answer);
  socket.emit("answer",answer);
});

socket.on("answer",a=>peer.setRemoteDescription(a));
socket.on("ice-candidate",c=>peer.addIceCandidate(c));

</script>

</body>
</html>
