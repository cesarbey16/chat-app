<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;display:flex;height:100vh;background:#0f172a;color:#fff;font-family:sans-serif}
#sidebar{width:220px;background:#020617;padding:10px}
#chat{flex:1;display:flex;flex-direction:column}
#messages{flex:1;overflow:auto;padding:10px}
#videos{display:flex;flex-wrap:wrap}

video{width:300px;border-radius:10px;margin:5px;background:black}

@media(max-width:768px){
  body{flex-direction:column}
  video{width:100%}
}
</style>
</head>

<body>

<div id="sidebar">
<button onclick="startScreen()">Ekran Paylaş</button>
</div>

<div id="chat">
<div id="messages"></div>
<div id="videos"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let peer;
let localStream;

/* TEK VIDEO KONTROL */
function clearVideos(){
  document.getElementById("videos").innerHTML="";
}

/* PEER */
function createPeer(){
  return new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}],
    iceCandidatePoolSize:10
  });
}

/* EKRAN PAYLAŞ */
async function startScreen(){

  clearVideos(); // 🔥 ÇİFT EKRANI SİLER

  const screen = await navigator.mediaDevices.getDisplayMedia({
    video:true,
    audio:true
  });

  localStream = screen;

  peer = createPeer();

  screen.getTracks().forEach(track=>{
    peer.addTrack(track, screen);
  });

  peer.onicecandidate=e=>{
    if(e.candidate) socket.emit("ice-candidate", e.candidate);
  };

  const offer = await peer.createOffer();
  await peer.setLocalDescription(offer);
  socket.emit("offer", offer);

  /* SADECE KENDİ EKRANINI GÖSTERMEK İSTERSEN AÇ */
  /*
  const video=document.createElement("video");
  video.srcObject=screen;
  video.autoplay=true;
  video.muted=true;
  document.getElementById("videos").appendChild(video);
  */

  screen.getVideoTracks()[0].onended=()=>{
    clearVideos();
    if(peer) peer.close();
  };
}

/* RECEIVE */
socket.on("offer", async offer=>{
  clearVideos(); // 🔥 ESKİYİ SİL

  peer = createPeer();

  peer.ontrack=e=>{
    clearVideos(); // 🔥 TEK VIDEO GARANTİ

    const video=document.createElement("video");
    video.srcObject=e.streams[0];
    video.autoplay=true;
    video.controls=true;
    video.playsInline=true;

    document.getElementById("videos").appendChild(video);
  };

  peer.onicecandidate=e=>{
    if(e.candidate) socket.emit("ice-candidate", e.candidate);
  };

  await peer.setRemoteDescription(offer);
  const answer = await peer.createAnswer();
  await peer.setLocalDescription(answer);
  socket.emit("answer", answer);
});

socket.on("answer", a=>{
  peer.setRemoteDescription(a);
});

socket.on("ice-candidate", c=>{
  peer.addIceCandidate(c);
});
</script>

</body>
</html>
